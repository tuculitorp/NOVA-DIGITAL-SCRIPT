<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova HUD - Scripts (Esqueleto de Autenticación)</title>
  <style>
    :root{--bg:#0b1020;--card:#151a35;--text:#e8eaf6;--muted:#a6a6a6;--accent:#6d28d9}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter, system-ui, Arial, sans-serif}
    .top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #222;background:#0f1430;position:sticky;top:0;z-index:10}
    .brand{font-weight:700}
    .user-bar{color:var(--muted);font-size:14px}
    .container{max-width:1100px;margin:20px auto;padding:0 16px}
    .tabs{display:flex;gap:8px;border-bottom:1px solid #2a2a3a;padding-bottom:6px;margin-bottom:12px}
    .tab{padding:8px 12px;border-radius:6px 6px 0 0;background:#1b1f45;border:1px solid #2a2a3a;cursor:pointer}
    .tab.active{background:#2b2f7a;color:white}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
    .card{background:var(--card);padding:12px;border:1px solid #2a2a3a;border-radius:8px}
    .card h4{margin:0 0 6px;font-size:14px}
    .btn{padding:8px 12px;border-radius:6px;border:1px solid #2a2a3a;background:#2a2a66;color:white;cursor:pointer}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
    .modal.open{display:flex}
    .dialog{background:#0d123b;color:white;padding:16px;border-radius:8px;width:min(92%,520px);border:1px solid #333}
    .form{display:grid;gap:8px;margin-bottom:8px}
    .input{padding:8px;border-radius:6px;border:1px solid #444;background:#0b1330;color:white}
    .textarea{min-height:100px;padding:8px;border-radius:6px;border:1px solid #444;background:#0b1330;color:white}
    @media (max-width: 700px){ .grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand">Nova HUD - Scripts</div>
    <div class="user-bar" id="userBar">No autenticado</div>
  </header>
  <main class="container">
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="community">Scripts Comunidad</button>
      <button class="tab" data-tab="nova">Nova Scripts</button>
      <button class="tab" data-tab="all">Todos</button>
    </div>

    <section id="section-community" class="grid section"></section>
    <section id="section-nova" class="grid section" style="display:none"></section>
    <section id="section-all" class="grid section" style="display:none"></section>

    <div style="margin-top:16px">
      <button class="btn" id="btnUploadCommunity">Subir a Comunidad</button>
      <button class="btn" id="btnUploadNova" style="margin-left:8px; display:none">Subir Nova Script</button>
      <button class="btn" id="btnOpenRegister" style="margin-left:8px">Registrarse</button>
      <button class="btn" id="btnOpenLogin" style="margin-left:8px">Iniciar sesión</button>
      <button class="btn" id="btnLogout" style="margin-left:8px; display:none">Cerrar sesión</button>
    </div>
  </main>

  <!-- Registro -->
  <div class="modal" id="modalRegister" aria-hidden="true">
    <div class="dialog">
      <h3>Registro</h3>
      <div class="form">
        <input class="input" id="regEmail" placeholder="Correo" />
        <input class="input" id="regUsername" placeholder="Usuario" />
        <input type="password" class="input" id="regPassword" placeholder="Contraseña" />
      </div>
      <button class="btn" id="btnRegister">Crear cuenta</button>
      <button class="btn" id="btnRegisterClose" style="margin-left:6px">Cancelar</button>
      <div id="regMsg" style="margin-top:6px;color:#ffd166"></div>
    </div>
  </div>

  <!-- Login -->
  <div class="modal" id="modalLogin" aria-hidden="true">
    <div class="dialog">
      <h3>Iniciar sesión</h3>
      <div class="form">
        <input class="input" id="loginUser" placeholder="Usuario o correo" />
        <input type="password" class="input" id="loginPassword" placeholder="Contraseña" />
      </div>
      <button class="btn" id="btnLogin">Entrar</button>
      <button class="btn" id="btnLoginClose" style="margin-left:6px">Cancelar</button>
      <div id="loginMsg" style="margin-top:6px;color:#ffd166"></div>
    </div>
  </div>

  <script>
  (function(){
    const STORAGE = { users: 'nh_users', session: 'nh_session', scripts: 'nh_scripts' };
    const DOM = {
      userBar: document.getElementById('userBar'),
      btnUploadCommunity: document.getElementById('btnUploadCommunity'),
      btnUploadNova: document.getElementById('btnUploadNova'),
      btnOpenRegister: document.getElementById('btnOpenRegister'),
      btnOpenLogin: document.getElementById('btnOpenLogin'),
      btnLogout: document.getElementById('btnLogout'),
      modalRegister: document.getElementById('modalRegister'),
      modalLogin: document.getElementById('modalLogin'),
      regEmail: document.getElementById('regEmail'),
      regUsername: document.getElementById('regUsername'),
      regPassword: document.getElementById('regPassword'),
      btnRegister: document.getElementById('btnRegister'),
      btnRegisterClose: document.getElementById('btnRegisterClose'),
      regMsg: document.getElementById('regMsg'),
      loginUser: document.getElementById('loginUser'),
      loginPassword: document.getElementById('loginPassword'),
      btnLogin: document.getElementById('btnLogin'),
      btnLoginClose: document.getElementById('btnLoginClose'),
      loginMsg: document.getElementById('loginMsg'),
      sectionCommunity: document.getElementById('section-community'),
      sectionNova: document.getElementById('section-nova'),
      sectionAll: document.getElementById('section-all'),
    };

    function getUsers(){ const s = localStorage.getItem(STORAGE.users); return s? JSON.parse(s) : []; }
    function saveUsers(u){ localStorage.setItem(STORAGE.users, JSON.stringify(u)); }
    function getSession(){ const s = localStorage.getItem(STORAGE.session); return s? JSON.parse(s) : null; }
    function saveSession(s){ localStorage.setItem(STORAGE.session, JSON.stringify(s)); }
    function hash(pw){ // simple placeholder
      return pw;
    }
    function ensureAdminExists(){ const users = getUsers(); if(!users.find(u => u.role==='admin')){ const admin = { id:'admin', username:'owner', email:'owner@example.com', password:'admin', role:'admin' }; users.push(admin); saveUsers(users); } }
    function isLoggedIn(){ return !!getSession(); }
    function current(){ return getSession(); }
    function updateUI(){ const s = getSession(); if(s){ DOM.userBar.textContent = 'Conectado: ' + s.username + ' (' + s.role + ')'; DOM.btnLogout.style.display='inline-block'; DOM.btnOpenLogin.style.display='none'; DOM.btnUploadCommunity.disabled=false; if(s.role==='admin') DOM.btnUploadNova.style.display='inline-block'; } else { DOM.userBar.textContent='No autenticado'; DOM.btnLogout.style.display='none'; DOM.btnOpenLogin.style.display='inline-block'; DOM.btnUploadCommunity.disabled=true; DOM.btnUploadNova.style.display='none'; } }
    function openModal(m){ m.classList.add('open'); }
    function closeModal(m){ m.classList.remove('open'); }

    // Init
    ensureAdminExists(); updateUI();

    // Event bindings
    DOM.btnOpenRegister.addEventListener('click', ()=> openModal(DOM.modalRegister));
    DOM.modalRegister.querySelector('#btnRegister').addEventListener('click', ()=> {
      const email = DOM.regEmail.value.trim(); const user = DOM.regUsername.value.trim(); const pw = DOM.regPassword.value.trim(); if(!email || !user || !pw){ DOM.regMsg.textContent='Completa todos los campos'; return; }
      const users = getUsers(); if(users.find(u=>u.username===user)){ DOM.regMsg.textContent='Usuario ya existe'; return; }
      const newUser = { id: 'u_'+Date.now(), username: user, email: email, password: pw, role: 'user' };
      users.push(newUser); saveUsers(users); DOM.regMsg.textContent='Cuenta creada. Ya puedes iniciar sesión.'; 
    });
    DOM.modalRegister.querySelector('#btnRegisterClose').addEventListener('click', ()=> { DOM.regEmail.value=''; DOM.regUsername.value=''; DOM.regPassword.value=''; DOM.regMsg.textContent=''; closeModal(DOM.modalRegister); });
    DOM.btnOpenLogin.addEventListener('click', ()=> openModal(DOM.modalLogin));
    DOM.modalLogin.querySelector('#btnLogin').addEventListener('click', ()=> {
      const userOrEmail = DOM.loginUser.value.trim(); const pw = DOM.loginPassword.value.trim(); if(!userOrEmail || !pw){ DOM.loginMsg.textContent='Ingresa usuario/correo y contraseña'; return; }
      const users = getUsers(); const userObj = users.find(u => (u.username===userOrEmail || u.email===userOrEmail)); if(!userObj){ DOM.loginMsg.textContent='Usuario no encontrado'; return; }
      if(userObj.password !== pw){ DOM.loginMsg.textContent='Contraseña incorrecta'; return; }
      saveSession({ id: userObj.id, username: userObj.username, email: userObj.email, role: userObj.role });
      closeModal(DOM.modalLogin); DOM.loginUser.value=''; DOM.loginPassword.value=''; DOM.loginMsg.textContent=''; updateUI();
    });
    DOM.modalLogin.querySelector('#btnLoginClose').addEventListener('click', ()=> { DOM.loginUser.value=''; DOM.loginPassword.value=''; closeModal(DOM.modalLogin); });
    DOM.btnLogout.addEventListener('click', ()=> { localStorage.removeItem(STORAGE.session); updateUI(); });
  })();
  </script>
</body>
</html>
