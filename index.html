<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nova HUD — Scripts</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--muted:#94a3b8;--accent:#7c3aed;--accent-2:#06b6d4;--glass:rgba(255,255,255,0.03)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial; background:linear-gradient(180deg,#071029 0%, #071629 60%); color:#e6eef8; -webkit-font-smoothing:antialiased}
    .container{max-width:1100px;margin:32px auto;padding:20px}
    header{display:flex;gap:16px;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700}
    h1{font-size:20px;margin:0}
    .controls{display:flex;gap:12px;align-items:center}
    .search{background:var(--glass);border:1px solid rgba(255,255,255,0.04);padding:8px 12px;border-radius:10px;display:flex;align-items:center;gap:8px}
    .search input{background:transparent;border:0;color:inherit;outline:none;width:220px}
    .btn{background:var(--accent);border:none;padding:8px 12px;border-radius:10px;color:white;cursor:pointer;font-weight:600}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06)}
    .stats{display:flex;gap:12px;margin:18px 0}
    .stat{background:var(--card);padding:12px;border-radius:10px;min-width:110px;text-align:center}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    .filters button{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
    .filters button.active{border-color:var(--accent);color:white;background:linear-gradient(90deg,rgba(124,58,237,0.12),rgba(6,182,212,0.06))}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:10px}
    .card img{width:100%;height:140px;object-fit:cover;border-radius:8px}
    .meta{display:flex;justify-content:space-between;align-items:center}
    .tags{display:flex;gap:6px;flex-wrap:wrap}
    .tag{font-size:12px;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,0.03);color:var(--muted)}
    .card .title{font-weight:700}
    .actions{display:flex;gap:8px}
    .small{padding:6px 8px;font-size:13px;border-radius:8px}
    .fav{background:transparent;border:1px solid rgba(255,255,255,0.05);cursor:pointer}
    footer{margin:28px 0;text-align:center;color:var(--muted)}
    /* Responsive */
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.container{padding:12px;margin:12px auto}.grid{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}.search input{width:140px}}
    /* Modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;padding:20px}
    .modal{background:#071029;padding:18px;border-radius:12px;max-width:700px;width:100%;box-shadow:0 8px 30px rgba(2,6,23,0.6);border:1px solid rgba(255,255,255,0.03)}
    .form-row{display:flex;gap:8px}
    .form-row .field{flex:1;display:flex;flex-direction:column;gap:6px}
    input[type="text"],textarea,select{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:10px;border-radius:8px;color:inherit;resize:vertical}
    textarea{min-height:90px}
    .hint{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <div class="logo">NH</div>
        <div>
          <h1>Nova HUD — Scripts</h1>
          <div class="hint">Scripts verificados por el Owner</div>
        </div>
      </div>
      <div class="controls">
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35" stroke="#9fb3d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="11" cy="11" r="6" stroke="#9fb3d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></circle></svg>
          <input id="searchInput" placeholder="Buscar scripts..." />
        </div>
        <button id="openAdmin" class="btn">Panel Owner</button>
      </div>
    </header>

    <div class="stats" id="stats">
      <div class="stat"><div class="muted">Total</div><div id="statTotal">0</div></div>
      <div class="stat"><div class="muted">Script Nova</div><div id="statNova">0</div></div>
      <div class="stat"><div class="muted">Premium</div><div id="statPremium">0</div></div>
    </div>

    <div class="filters" id="filters">
      <button data-filter="all" class="active">Todos</button>
      <button data-filter="nova">Script Nova</button>
      <button data-filter="premium">Premium</button>
    </div>

    <div class="grid" id="grid"></div>

    <footer>Hecho con ❤️ por Owen — Nova HUD</footer>
  </div>

  <!-- Modal: Admin -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>Subir nuevo script</h3>
      <div class="hint">Agrega un script con su imagen. Se guardará en Local Storage.</div>
      <div style="height:12px"></div>
      <div class="form-row">
        <div class="field">
          <label>Título</label>
          <input id="fTitle" type="text" />
        </div>
        <div class="field">
          <label>Tipo</label>
          <select id="fType"><option value="free">Gratis</option><option value="nova">Script Nova</option><option value="premium">Premium</option></select>
        </div>
      </div>
      <div style="height:8px"></div>
      <div class="field">
        <label>Descripción</label>
        <textarea id="fDesc"></textarea>
      </div>
      <div style="height:8px"></div>
      <div class="form-row">
        <div class="field">
          <label>Precio (solo Premium)</label>
          <input id="fPrice" type="text" placeholder="Ej: 4.99" />
        </div>
        <div class="field">
          <label>Imagen (screenshot)</label>
          <input id="fImage" type="file" accept="image/*" />
        </div>
      </div>
      <div style="height:8px"></div>
      <div class="field">
        <label>Codigo / Contenido del script</label>
        <textarea id="fCode"></textarea>
      </div>
      <div style="height:12px;display:flex;justify-content:flex-end;gap:8px">
        <button id="closeModal" class="btn ghost small">Cancelar</button>
        <button id="saveScript" class="btn small">Guardar script</button>
      </div>
    </div>
  </div>

  <script>
    // Storage keys
    const KEY = 'nova_scripts_v1';
    const FAV = 'nova_fav_v1';

    // DOM
    const grid = document.getElementById('grid');
    const statTotal = document.getElementById('statTotal');
    const statNova = document.getElementById('statNova');
    const statPremium = document.getElementById('statPremium');
    const filters = document.getElementById('filters');
    const searchInput = document.getElementById('searchInput');

    // Modal fields
    const modal = document.getElementById('modalBackdrop');
    const openAdmin = document.getElementById('openAdmin');
    const closeModal = document.getElementById('closeModal');
    const saveScript = document.getElementById('saveScript');
    const fTitle = document.getElementById('fTitle');
    const fDesc = document.getElementById('fDesc');
    const fType = document.getElementById('fType');
    const fPrice = document.getElementById('fPrice');
    const fImage = document.getElementById('fImage');
    const fCode = document.getElementById('fCode');

    // App state
    let scripts = [];
    let favs = [];
    let currentFilter = 'all';
    let query = '';

    // Utilities
    function load(){
      try{ scripts = JSON.parse(localStorage.getItem(KEY)) || defaultScripts(); }catch(e){ scripts = defaultScripts(); }
      try{ favs = JSON.parse(localStorage.getItem(FAV)) || []; }catch(e){ favs = []; }
      render();
    }
    function save(){ localStorage.setItem(KEY, JSON.stringify(scripts)); }
    function saveFavs(){ localStorage.setItem(FAV, JSON.stringify(favs)); }

    function defaultScripts(){
      return [
        {id:cryptoRandom(),title:'Auto farms x1',desc:'Script básico para automations',type:'nova',price:'',img:'https://placehold.co/600x400?text=Nova+Script',code:'print("Hola Nova")',author:'Owen',date:Date.now()},
        {id:cryptoRandom(),title:'Speed Boost',desc:'Mejora de velocidad',type:'free',price:'',img:'https://placehold.co/600x400?text=Gratis',code:'-- script',author:'Owen',date:Date.now()},
      ];
    }

    function cryptoRandom(){ return Math.random().toString(36).slice(2,9); }

    // Render
    function render(){
      // stats
      statTotal.textContent = scripts.length;
      statNova.textContent = scripts.filter(s=>s.type==='nova').length;
      statPremium.textContent = scripts.filter(s=>s.type==='premium').length;

      // grid
      grid.innerHTML = '';
      const list = scripts.filter(s=>{
        if(currentFilter==='nova') return s.type==='nova';
        if(currentFilter==='premium') return s.type==='premium';
        return true;
      }).filter(s=>{
        if(!query) return true;
        const q = query.toLowerCase();
        return s.title.toLowerCase().includes(q) || (s.desc||'').toLowerCase().includes(q) || (s.author||'').toLowerCase().includes(q);
      });

      if(list.length===0){ grid.innerHTML = '<div style="grid-column:1/-1;padding:18px;background:rgba(255,255,255,0.02);border-radius:10px;text-align:center;color:var(--muted)">No hay scripts publicados.</div>';return }

      list.forEach(s=>{
        const el = document.createElement('div'); el.className='card';
        el.innerHTML = `
          <img src="${s.img || 'https://placehold.co/600x400?text=Sin+imagen'}" alt="${escapeHtml(s.title)}"/>
          <div>
            <div class="meta">
              <div>
                <div class="title">${escapeHtml(s.title)}</div>
                <div class="hint">${escapeHtml(s.desc)}</div>
              </div>
              <div class="tags">
                <div class="tag">${s.type==='premium'? 'Premium' : (s.type==='nova' ? 'Script Nova' : 'Gratis')}</div>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
              <div class="hint">By ${escapeHtml(s.author||'Owner')}</div>
              <div class="actions">
                <button class="small btn" data-action="download" data-id="${s.id}">Descargar</button>
                <button class="small fav" data-action="fav" data-id="${s.id}">${favs.includes(s.id)? '❤️ Guardado' : '♡ Guardar'}</button>
              </div>
            </div>
          </div>
        `;
        grid.appendChild(el);
      });
    }

    // Helpers
    function escapeHtml(text){ return (text||'').toString().replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }

    // Events
    filters.addEventListener('click', e=>{
      const btn = e.target.closest('button'); if(!btn) return;
      Array.from(filters.querySelectorAll('button')).forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); currentFilter = btn.dataset.filter; render();
    });

    searchInput.addEventListener('input', e=>{ query = e.target.value.trim(); render(); });

    grid.addEventListener('click', e=>{
      const btn = e.target.closest('button'); if(!btn) return;
      const id = btn.dataset.id; const action = btn.dataset.action;
      const item = scripts.find(s=>s.id===id); if(!item) return;
      if(action==='download'){
        const blob = new Blob([item.code||''],{type:'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href=url; a.download = (item.title||'script')+'.txt'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      }
      if(action==='fav'){
        if(favs.includes(id)){ favs = favs.filter(x=>x!==id); } else { favs.push(id); }
        saveFavs(); render();
      }
    });

    // Admin modal
    openAdmin.addEventListener('click', ()=>{ modal.style.display='flex'; });
    closeModal.addEventListener('click', ()=>{ modal.style.display='none'; clearForm(); });
    modal.addEventListener('click', e=>{ if(e.target===modal){ modal.style.display='none'; clearForm(); } });

    saveScript.addEventListener('click', async ()=>{
      const title = fTitle.value.trim();
      if(!title){ alert('El título es obligatorio'); return; }
      const desc = fDesc.value.trim();
      const type = fType.value;
      const price = fPrice.value.trim();
      const code = fCode.value;
      const author = 'Owen';
      let imgData = '';
      if(fImage.files && fImage.files[0]){
        imgData = await toBase64(fImage.files[0]);
      } else {
        imgData = 'https://placehold.co/600x400?text=No+image';
      }
      const item = { id:cryptoRandom(), title, desc, type, price, code, img: imgData, author, date: Date.now() };
      scripts.unshift(item); save(); render(); modal.style.display='none'; clearForm();
      alert('Script guardado correctamente');
    });

    function clearForm(){ fTitle.value=''; fDesc.value=''; fType.value='free'; fPrice.value=''; fImage.value=''; fCode.value=''; }

    function toBase64(file){ return new Promise((res,rej)=>{ const reader = new FileReader(); reader.onload = ()=>res(reader.result); reader.onerror = err=>rej(err); reader.readAsDataURL(file); }); }

    // Initialization
    load();
  </script>
</body>
</html>
